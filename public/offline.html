<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors-ligne — LA DIOSA</title>
  <style>
    body { margin:0; font-family: system-ui, -apple-system, sans-serif; background:#0d1f22; color:#f7efe2; display:flex; align-items:center; justify-content:center; height:100vh; text-align:center; padding:20px; }
    .wrap { max-width: 420px; }
    h1 { font-size:1.6rem; margin-bottom:.5rem; }
    p { opacity:.8; line-height:1.5; }
    button { margin-top:1.5rem; padding:.8rem 1.6rem; background:#f7efe2; color:#0d1f22; border:0; border-radius:8px; font-weight:600; cursor:pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🍋 Hors-ligne</h1>
    <p>Vous n'êtes pas connectée au réseau. Réessayez dès que votre connexion revient.</p>
    <button onclick="location.reload()">Réessayer</button>
  </div>
</body>
</html>
